<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青衍 · Brand Identity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:   #000b14;
      --c0:   #00ffe4;   /* brightest neon */
      --c1:   #00d4b0;   /* primary teal  */
      --c2:   #007a68;   /* mid           */
      --c3:   #003830;   /* dim structural*/
      --c4:   #001c16;   /* very dim      */
      --txt:  #b8f0e4;
      --dim:  #3a8878;
      --mute: #1a4840;
    }

    body {
      background: var(--bg);
      background-image: radial-gradient(circle, #091a14 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--txt);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 48px 100px;
    }

    /* ─── page header ─── */
    .pg-header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeUp .9s ease-out both;
    }
    .pg-header .kicker {
      font-size: 9px;
      letter-spacing: 0.6em;
      color: var(--mute);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .pg-header h1 {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.42em;
      color: var(--c2);
    }

    /* ─── hero ─── */
    .hero {
      display: flex;
      align-items: center;
      gap: 72px;
      margin-bottom: 68px;
      animation: fadeUp .9s ease-out .1s both;
    }
    .hero-logo { flex-shrink: 0; }

    .hero-info { max-width: 240px; }
    .brand-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: .06em;
      color: var(--txt);
      margin-bottom: 6px;
    }
    .brand-en {
      font-size: 10px;
      letter-spacing: 0.55em;
      color: var(--c2);
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .hr { width: 28px; height: 1px; background: var(--c3); margin-bottom: 28px; }
    .hero-info p {
      font-family: 'Noto Serif SC', serif;
      font-size: 12.5px;
      line-height: 2.4;
      color: var(--mute);
      font-weight: 300;
    }
    .hero-info p + p { margin-top: 16px; font-size: 11px; line-height: 2.6; }
    .tag {
      display: inline-block;
      margin-top: 26px;
      font-size: 9px;
      letter-spacing: .4em;
      color: var(--c3);
      border: 1px solid var(--c3);
      padding: 4px 10px;
    }

    /* ─── variants ─── */
    .variants {
      display: flex;
      gap: 16px;
      animation: fadeUp .9s ease-out .25s both;
    }
    .v-card { display: flex; flex-direction: column; align-items: center; gap: 11px; }
    .v-label {
      font-size: 8px; letter-spacing: .5em; color: var(--mute);
      text-transform: uppercase;
    }

    /* ─── SVG animations ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-dot {
      0%,100% { r: 3; opacity: .9; }
      50%      { r: 5; opacity: .4; }
    }
    @keyframes signal {
      0%   { opacity: 0; }
      12%  { opacity: var(--op, 1); }
      72%  { opacity: var(--op, 1); }
      100% { opacity: 0; }
    }

    .orbit1 {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 18s linear infinite;
    }
    .orbit2 {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 26s linear infinite reverse;
    }

    /* signal arcs */
    .arc1 { --op:.95; animation: signal 4.2s ease-in-out infinite 0.0s; }
    .arc2 { --op:.68; animation: signal 4.2s ease-in-out infinite 0.6s; }
    .arc3 { --op:.44; animation: signal 4.2s ease-in-out infinite 1.2s; }

    /* center pulse */
    .pulse { animation: pulse-dot 2.4s ease-in-out infinite; }
  </style>
</head>
<body>

  <div class="pg-header">
    <div class="kicker">// brand_identity_system · visual_mark</div>
    <h1>SIGNAL OUTPUT · 图形标志</h1>
  </div>

  <div class="hero">

    <!-- ═══ PRIMARY 400×400 LOGO ═══ -->

            <feMergeNode in="b1"/>
            <feMergeNode in="b2"/>
            <feMergeNode in="SourceGraphic"/>

      <circle cx="382" cy="18" r="1.5" fill="#0e3028"/>
      <circle cx="18" cy="382" r="1.5" fill="#0e3028"/>
      <circle cx="382" cy="382" r="1.5" fill="#0e3028"/>

      <!-- technical annotation (bottom-right) -->
      <text x="374" y="374" text-anchor="end" font-family="'Share Tech Mono','Courier New',monospace"

      <!-- center crosshair faint vertical guide (very dim) -->

      <line x1="200" y1="364" x2="200" y2="374"
            stroke="#0a2820" stroke-width=".8" stroke-dasharray="2 4"/>


      <!-- ═══ MARK ═══ -->

      <!-- ── signal arcs (衍 = propagating signal) ── -->

      <circle class="arc1" cx="174" cy="178" r="2.2" fill="#00ffd8" filter="url(#glow-sm)"/>
      <circle class="arc1" cx="226" cy="178" r="2.2" fill="#00ffd8" filter="url(#glow-sm)"/>

      <!-- Arc 2  r=48 -->

      <!-- Arc 3  r=72 -->

      <circle class="arc3" cx="272" cy="178" r="1.5" fill="#009880" opacity=".7"/>
      <path   class="arc3" d="M 128 178 A 72 72 0 0 1 272 178"

              stroke-linecap="round"/>

      <!-- small radial tick marks at arc ends (technical precision) -->

      <line x1="152" y1="175" x2="152" y2="181" stroke="#007a68" stroke-width=".8" opacity=".5"/>
      <line x1="248" y1="175" x2="248" y2="181" stroke="#007a68" stroke-width=".8" opacity=".5"/>
      <!-- arc3 left tick -->
      <line x1="128" y1="175" x2="128" y2="181" stroke="#005040" stroke-width=".8" opacity=".4"/>
      <line x1="272" y1="175" x2="272" y2="181" stroke="#005040" stroke-width=".8" opacity=".4"/>


      <!-- ═══ TEXT ═══ -->

      <!-- thin rule above text -->
      <line x1="110" y1="272" x2="290" y2="272"
            stroke="#0a2820" stroke-width=".8"/>
      <circle cx="110" cy="272" r="1.2" fill="#0a2820"/>
      <circle cx="290" cy="272" r="1.2" fill="#0a2820"/>

      <!-- 青衍 -->
      <text x="200" y="330"
            text-anchor="middle"
            font-family="'Noto Serif SC','PingFang SC','STSong',serif"
            font-size="64"
            font-weight="400"
            fill="#b8f0e4"
            letter-spacing="6">青衍</text>

      <!-- pinyin -->

            text-anchor="middle"
            font-family="'Share Tech Mono','Courier New',monospace"
            font-size="10"
            fill="#1e6856"
            letter-spacing="7">QĪNG YǍN</text>

      <!-- thin rule below text -->

            stroke="#061a14" stroke-width=".8"/>

    </svg>
    </div>

        <rect width="400" height="400" fill="#f2f2f2"/>
        <rect x="1" y="1" width="398" height="398" fill="none" stroke="#c8c8c8" stroke-width="1"/>
